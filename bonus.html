<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VM-tipping 2026 — Bonusspørsmål</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <nav id="nav"></nav>
  <main class="wrap">
    <div class="page-head">
      <h1>Bonusspørsmål</h1>
      <p id="deadline" class="muted"></p>
    </div>

    <div class="namebar">
      <label for="player-name">Navnet ditt:</label>
      <input type="text" id="player-name" placeholder="F.eks. Ola Nordmann" autocomplete="name">
    </div>

    <div id="content"><p class="muted">Laster …</p></div>

    <div class="sticky-actions">
      <span id="progress" class="muted"></span>
      <button class="btn btn-ghost btn-sm" id="reset-btn">Nullstill</button>
      <span class="spacer"></span>
      <a class="btn" href="index.html">← Til tippeskjema</a>
      <button class="btn btn-primary" id="publish-btn">Publiser svarene mine</button>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/players.js"></script>
  <script src="js/config.js"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/db.js"></script>
  <script src="js/app.js"></script>
  <script src="js/autocomplete.js"></script>
  <script src="js/draft.js"></script>
  <script src="js/publish.js"></script>
  <script src="js/bonus-form.js"></script>
  <script src="js/bonus.js"></script>
</body>
</html>
